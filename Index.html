<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>JobHunter API Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 40px;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      margin-bottom: 30px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
    }

    button {
      padding: 15px 25px;
      border: none;
      border-radius: 12px;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .jobs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .job-card {
      background: #1e293b;
      padding: 20px;
      border-radius: 18px;
      transition: 0.3s;
    }

    .job-card:hover {
      transform: translateY(-5px);
    }

    .job-card h2 {
      margin-bottom: 10px;
      color: #38bdf8;
    }

    .job-card p {
      margin-bottom: 8px;
      color: #cbd5e1;
    }

    .apply-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 18px;
      background: #22c55e;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    .loading {
      text-align: center;
      margin-top: 20px;
      font-size: 18px;
    }

    @media(max-width:600px) {
      .search-box {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>JobHunter API Dashboard 🚀</h1>

    <p class="subtitle">
      Search Developer Jobs Using API
    </p>

    <div class="search-box">

      <input
        type="text"
        id="searchInput"
        placeholder="Search jobs like Java Developer"
      />

      <button onclick="searchJobs()">
        Search
      </button>

    </div>

    <div class="loading" id="loading"></div>

    <div class="jobs" id="jobsContainer"></div>

  </div>

  <script>

    async function searchJobs() {

      const keyword =
        document.getElementById("searchInput").value;

      const jobsContainer =
        document.getElementById("jobsContainer");

      const loading =
        document.getElementById("loading");

      jobsContainer.innerHTML = "";

      loading.innerHTML = "Loading jobs...";

      try {

        const response =
          await fetch(
            `https://remotive.com/api/remote-jobs?search=${keyword}`
          );

        const data = await response.json();

        loading.innerHTML = "";

        if (data.jobs.length === 0) {

          jobsContainer.innerHTML =
            "<h2>No jobs found 😢</h2>";

          return;
        }

        data.jobs.slice(0, 12).forEach(job => {

          jobsContainer.innerHTML += `

            <div class="job-card">

              <h2>${job.title}</h2>

              <p><strong>Company:</strong>
              ${job.company_name}</p>

              <p><strong>Location:</strong>
              ${job.candidate_required_location}</p>

              <p><strong>Category:</strong>
              ${job.category}</p>

              <a
                class="apply-btn"
                href="${job.url}"
                target="_blank"
              >
                Apply Now
              </a>

            </div>

          `;
        });

      } catch (error) {

        loading.innerHTML =
          "API Error 😭";

        console.log(error);
      }
    }

  </script>

</body>
</html>
